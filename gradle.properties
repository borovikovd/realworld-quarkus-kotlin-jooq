# Gradle properties

# Raised from the 512m default so `dependencyCheckAnalyze` can hold the NVD H2
# database (~500 MiB) in memory without GC thrashing.
org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m

# Run independent tasks (ktlint / detekt / spotbugs / test) concurrently when their
# inputs allow it — meaningful for `./gradlew build` or `check`.
org.gradle.parallel=true
# Cache the Gradle configuration phase. Skips ~1–3s of plugin/script evaluation per
# invocation. Flip to false if a plugin upgrade regresses config-cache compatibility.
org.gradle.configuration-cache=true

quarkusPluginId=io.quarkus
quarkusPluginVersion=3.32.3
quarkusPlatformGroupId=io.quarkus.platform
quarkusPlatformArtifactId=quarkus-bom
quarkusPlatformVersion=3.32.3
