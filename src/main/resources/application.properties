# Application
quarkus.application.name=realworld-api
quarkus.http.port=8080
quarkus.rest.path=/api

# Datasource — credentials must be set via QUARKUS_DATASOURCE_USERNAME /
# QUARKUS_DATASOURCE_PASSWORD env vars. No defaults; startup fails if unset.
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/realworld
quarkus.datasource.jdbc.min-size=5
quarkus.datasource.jdbc.max-size=20

# jOOQ
quarkus.jooq.dialect=POSTGRES
quarkus.jooq.configuration-inject=com.example.infrastructure.persistence.jooq.JooqConfiguration

# SmallRye JWT
mp.jwt.verify.publickey.location=/public.pem
mp.jwt.verify.issuer=https://realworld.io
smallrye.jwt.sign.key.location=/private.pem
# Token lifespans — override via APP_TOKEN_ACCESS_EXPIRY_SECONDS / APP_TOKEN_REFRESH_EXPIRY_DAYS
app.token.access-expiry-seconds=900
app.token.refresh-expiry-days=30

# OpenAPI and Swagger UI
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.path=/swagger-ui
%dev.quarkus.swagger-ui.always-include=true
%test.quarkus.swagger-ui.always-include=true

# CORS — origins MUST be set via QUARKUS_HTTP_CORS_ORIGINS env var. No default;
# startup fails if the env var is missing in prod. Dev/test set it explicitly below.
quarkus.http.cors.origins=${QUARKUS_HTTP_CORS_ORIGINS}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.exposed-headers=Content-Disposition
quarkus.http.cors.access-control-max-age=24H

# Vault — url and auth required in prod via QUARKUS_VAULT_URL / QUARKUS_VAULT_AUTHENTICATION_CLIENT_TOKEN.
# HIGH suppresses request/response body logging so keyset bytes never appear in logs.
# Tink keysets — wrapped at rest by the Vault Transit KEK. Required; startup fails closed if unset.
quarkus.vault.url=${QUARKUS_VAULT_URL}
quarkus.vault.log-confidentiality-level=HIGH
app.tink.aead.keyset=${APP_TINK_AEAD_KEYSET}
app.tink.mac.keyset=${APP_TINK_MAC_KEYSET}
app.tink.token.mac.keyset=${APP_TINK_TOKEN_MAC_KEYSET}

# Rate limiting — number of trusted reverse proxies in front of this service.
# 0 = direct connection (use TCP remote address, ignore X-Forwarded-For)
# N = trust N proxies (extract client IP at position size-N in X-Forwarded-For)
rate-limit.trusted-proxy-count=0
# Per-IP request budgets. Set max-requests to 0 to disable a limiter.
rate-limit.login.max-requests=10
rate-limit.registration.max-requests=3
rate-limit.window-seconds=60
# Tests share a single source IP (loopback) and would saturate the registration
# limiter; disable both budgets in the test profile.
%test.rate-limit.login.max-requests=0
%test.rate-limit.registration.max-requests=0

# Logging
quarkus.log.level=INFO
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.category."com.example".level=DEBUG
%dev.quarkus.log.category."org.jooq".level=DEBUG
%test.quarkus.log.category."org.jooq".level=DEBUG
quarkus.log.category."io.quarkus.bootstrap.classloading".level=INFO

# JSON logging (enabled by extension, disable in dev/test for human-readable output)
%dev.quarkus.log.console.json.enabled=false
%test.quarkus.log.console.json.enabled=false
quarkus.log.console.json.additional-field."service".value=realworld-api

# Container image
# Usage: ./gradlew build -Dquarkus.native.enabled=true -Dquarkus.native.container-build=true -Dquarkus.package.jar.enabled=false -Dquarkus.container-image.build=true
quarkus.native.builder-image=quay.io/quarkus/ubi9-quarkus-mandrel-builder-image:jdk-21
quarkus.docker.dockerfile-native-path=src/main/docker/Dockerfile.native-micro
quarkus.container-image.build=false
quarkus.container-image.group=
quarkus.container-image.name=realworld-api
quarkus.container-image.tag=latest

# OpenTelemetry (disabled by default, enable via QUARKUS_OTEL_SDK_DISABLED=false)
quarkus.otel.sdk.disabled=true
quarkus.otel.exporter.otlp.endpoint=http://localhost:4317

# Dev mode settings
%dev.rate-limit.login.max-requests=0
%dev.rate-limit.registration.max-requests=0
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/realworld
%dev.quarkus.datasource.username=realworld
%dev.quarkus.datasource.password=realworld
%dev.quarkus.log.level=DEBUG
%dev.quarkus.vault.url=http://localhost:8200
# Static root token is intentional for local dev only. Use AppRole auth in production:
# quarkus.vault.authentication.app-role.role-id / secret-id-request-prefix.
%dev.quarkus.vault.authentication.client-token=dev-root-token

# Test mode settings
%test.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/realworld_test
%test.quarkus.datasource.username=realworld
%test.quarkus.datasource.password=realworld
%test.quarkus.log.level=DEBUG
%test.quarkus.vault.authentication.client-token=test-root-token
