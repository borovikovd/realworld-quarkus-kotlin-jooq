name: "Security / Container"

on:
  push:
    branches: [master]
    paths:
      - "Dockerfile*"
      - "src/**"
      - "build.gradle.kts"
      - "gradle.properties"
  pull_request:
    branches: [master]
    paths:
      - "Dockerfile*"
      - "src/**"
      - "build.gradle.kts"
      - "gradle.properties"
  schedule:
    - cron: "0 6 * * 1"

jobs:
  trivy:
    name: Trivy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Build native image
        run: chmod +x gradlew && ./gradlew build -Dquarkus.native.enabled=true -Dquarkus.native.container-build=true -Dquarkus.container-image.build=true -Dquarkus.container-image.tag=scan --no-daemon
        env:
          QUARKUS_CONTAINER_IMAGE_NAME: realworld-api

      - name: Trivy scan (SARIF)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "realworld-api:scan"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "HIGH,CRITICAL"
          exit-code: "0"
          trivyignores: ".trivyignore"

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Trivy scan (table)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "realworld-api:scan"
          format: "table"
          severity: "HIGH,CRITICAL,MEDIUM"
          trivyignores: ".trivyignore"
