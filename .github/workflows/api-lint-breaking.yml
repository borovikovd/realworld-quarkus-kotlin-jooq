name: "API / Lint"

on:
  push:
    branches: [master]
    paths:
      - "src/main/resources/openapi.yaml"
      - ".spectral.yml"
  pull_request:
    branches: [master]
    paths:
      - "src/main/resources/openapi.yaml"
      - ".spectral.yml"

jobs:
  spectral:
    name: Spectral
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Spectral
        uses: stoplightio/spectral-action@6416fd018ae38e60136775066eb3e98172143141 # v0.8.13
        with:
          file_glob: src/main/resources/openapi.yaml

  oasdiff:
    name: oasdiff Breaking Changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout base branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.base_ref }}
          path: base

      - name: Check for breaking API changes
        uses: oasdiff/oasdiff-action/breaking@26ccb332c67a45ca649de9faf60552ef1b8260d9 # v0.0.46
        with:
          base: base/src/main/resources/openapi.yaml
          revision: src/main/resources/openapi.yaml
