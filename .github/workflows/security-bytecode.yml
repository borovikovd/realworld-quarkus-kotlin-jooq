name: "Security / Bytecode"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  spotbugs:
    name: SpotBugs + FindSecBugs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Run SpotBugs
        run: chmod +x gradlew && ./gradlew spotbugsMain --no-daemon

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: spotbugs-reports
          path: build/reports/spotbugs/

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: build/reports/spotbugs/main.sarif
          category: spotbugs
