name: "Security / SCA"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Cache NVD database
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.gradle/dependency-check-data/
          key: nvd-${{ runner.os }}-${{ hashFiles('**/build.gradle.kts') }}
          restore-keys: nvd-${{ runner.os }}-

      # Advisory only: findings are reported via SARIF (see step below) and
      # visible in the Security tab, but don't block CI. SCA hits add noise
      # without enough signal to gate merges on automatically.
      - name: Run OWASP Dependency-Check
        run: chmod +x gradlew && ./gradlew dependencyCheckAnalyze --no-daemon
        continue-on-error: true
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload reports
        if: always() && hashFiles('build/reports/dependency-check/*') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dependency-check-reports
          path: build/reports/dependency-check/

      - name: Upload SARIF to GitHub Security
        if: always() && hashFiles('build/reports/dependency-check/dependency-check-report.sarif') != ''
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          sarif_file: build/reports/dependency-check/dependency-check-report.sarif
          category: dependency-check
