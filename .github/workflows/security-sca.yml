name: "Security / SCA"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Resolve dependencies
        run: chmod +x gradlew && ./gradlew dependencies --configuration runtimeClasspath -q > deps.txt

      - name: Cache NVD database
        uses: actions/cache@v4
        with:
          path: ~/.gradle/dependency-check-data/
          key: nvd-${{ runner.os }}-${{ hashFiles('**/build.gradle.kts') }}
          restore-keys: nvd-${{ runner.os }}-

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@v5
        with:
          project: realworld-api
          path: .
          format: "HTML,JSON,SARIF"
          args: >-
            --failOnCVSS 7
            --disableAssembly
            --disableNodeJS
            --disableRetireJS
            --nvdApiKey ${{ secrets.NVD_API_KEY }}
        continue-on-error: true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dependency-check-reports
          path: reports/

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/dependency-check-report.sarif
          category: dependency-check
