name: "Security / SCA"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Cache NVD database
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.gradle/dependency-check-data/
          key: nvd-${{ runner.os }}-${{ hashFiles('**/build.gradle.kts') }}
          restore-keys: nvd-${{ runner.os }}-

      - name: Run OWASP Dependency-Check
        run: chmod +x gradlew && ./gradlew dependencyCheckAnalyze --no-daemon
        continue-on-error: false
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload reports
        if: always() && hashFiles('build/reports/dependency-check/*') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dependency-check-reports
          path: build/reports/dependency-check/

      - name: Upload SARIF to GitHub Security
        if: always() && hashFiles('build/reports/dependency-check/dependency-check-report.sarif') != ''
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          sarif_file: build/reports/dependency-check/dependency-check-report.sarif
          category: dependency-check
