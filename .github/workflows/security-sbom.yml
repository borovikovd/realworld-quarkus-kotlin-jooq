name: "Security / SBOM"

on:
  push:
    branches: [master]
  release:
    types: [published]

jobs:
  sbom:
    name: CycloneDX SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Generate SBOM
        run: chmod +x gradlew && ./gradlew cyclonedxBom --no-daemon

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: build/reports/sbom/
          retention-days: 90

      - name: Attach SBOM to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/reports/sbom/sbom.json
            build/reports/sbom/sbom.xml
