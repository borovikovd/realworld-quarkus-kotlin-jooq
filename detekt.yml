build:
  maxIssues: 0

complexity:
  CognitiveComplexMethod:
    active: true
  TooManyFunctions:
    thresholdInInterfaces: 20
    thresholdInClasses: 25
  LongParameterList:
    functionThreshold: 10
    constructorThreshold: 10
    ignoreDefaultParameters: true

style:
  MagicNumber:
    ignoreAnnotation: true
    ignoreEnums: true
  ThrowsCount:
    max: 4
