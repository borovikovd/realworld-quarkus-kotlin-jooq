build:
  maxIssues: 0

complexity:
  CognitiveComplexMethod:
    active: true
  TooManyFunctions:
    thresholdInClasses: 13
  LongParameterList:
    functionThreshold: 10
    constructorThreshold: 10
    ignoreDefaultParameters: true

style:
  MagicNumber:
    ignoreAnnotation: true
    ignoreEnums: true
  ThrowsCount:
    max: 3
